<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>intelX — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:13px;background:#f4f6f8;color:#0d1f35;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid #dde2e8;border-radius:12px;padding:36px 40px;width:480px;box-shadow:0 4px 24px rgba(13,31,53,.08)}
.logo{font-size:20px;font-weight:800;color:#0d1f35;margin-bottom:4px}
.logo span{color:#1a8aab}
.subtitle{font-size:11px;color:#8a96a3;margin-bottom:28px}
.section-title{font-size:10px;font-weight:700;color:#8a96a3;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #dde2e8}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:#4a5a6b;margin-bottom:4px}
.field input{width:100%;padding:8px 10px;font-size:12px;font-family:'Inter',sans-serif;border:1px solid #c8d0da;border-radius:6px;outline:none;transition:border-color .15s;background:#f8f9fa;color:#0d1f35}
.field input:focus{border-color:#1a8aab;background:#fff}
.row{display:flex;gap:8px}
.row .field{flex:1}
.btn{padding:8px 16px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;border:none;border-radius:6px;cursor:pointer;transition:all .15s}
.btn-primary{background:#0d1f35;color:#fff}
.btn-primary:hover{background:#1a3050}
.btn-danger{background:#fdf0f0;color:#e03b3b;border:1px solid #fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-secondary{background:#f8f9fa;color:#4a5a6b;border:1px solid #c8d0da}
.btn-secondary:hover{background:#f0f2f4}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:11px;padding:8px 12px;border-radius:5px;margin-bottom:12px;display:none}
.msg.show{display:block}
.msg.success{background:#f0fdf4;color:#1a9e6a;border:1px solid #a7f3d0}
.msg.error{background:#fdf0f0;color:#e03b3b;border:1px solid #fecaca}
.user-list{margin-top:4px}
.user-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f8f9fa;border:1px solid #dde2e8;border-radius:6px;margin-bottom:6px}
.user-name{font-size:12px;font-weight:600;flex:1;font-family:'JetBrains Mono',monospace;color:#0d1f35}
.user-date{font-size:10px;color:#8a96a3}
.divider{height:1px;background:#dde2e8;margin:24px 0}
#auth-section{display:block}
#main-section{display:none}
.gate-hint{font-size:11px;color:#8a96a3;margin-top:10px;text-align:center}
.empty{font-size:12px;color:#8a96a3;padding:16px;text-align:center;background:#f8f9fa;border-radius:6px}
.reset-row{display:flex;gap:6px;align-items:center;margin-top:4px}
.reset-row input{flex:1;padding:6px 10px;font-size:11px;font-family:'Inter',sans-serif;border:1px solid #c8d0da;border-radius:5px;outline:none;background:#fff}
.reset-row input:focus{border-color:#1a8aab}
</style>
</head>
<body>

<!-- Auth gate -->
<div class="card" id="auth-section">
  <div class="logo">intel<span>X</span></div>
  <div class="subtitle">Administrator access</div>
  <div class="msg" id="auth-msg"></div>
  <div class="field">
    <label>Admin password</label>
    <input type="password" id="admin-pass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')authAdmin()">
  </div>
  <button class="btn btn-primary" onclick="authAdmin()" style="width:100%">Access admin panel</button>
  <div class="gate-hint"><a href="/" style="color:#1a8aab;text-decoration:none">← Back to intelX</a></div>
</div>

<!-- Main admin panel -->
<div class="card" id="main-section">
  <div class="logo">intel<span>X</span></div>
  <div class="subtitle">User management</div>

  <div class="msg" id="main-msg"></div>

  <!-- Add user -->
  <div class="section-title">Add new user</div>
  <div class="row">
    <div class="field"><label>Username</label><input type="text" id="new-user" placeholder="e.g. analyst1" autocomplete="off"></div>
    <div class="field"><label>Password</label><input type="password" id="new-pass" placeholder="Min. 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')addUser()"></div>
  </div>
  <button class="btn btn-primary" onclick="addUser()" id="add-btn">Add user</button>

  <div class="divider"></div>

  <!-- User list -->
  <div class="section-title">Active users <span id="user-count" style="font-weight:400;color:#8a96a3"></span></div>
  <div class="user-list" id="user-list"><div class="empty">Loading users…</div></div>

  <div style="margin-top:20px;text-align:center">
    <a href="/" style="font-size:11px;color:#1a8aab;text-decoration:none">← Back to intelX</a>
    &nbsp;·&nbsp;
    <a href="#" onclick="logout()" style="font-size:11px;color:#8a96a3;text-decoration:none">Logout</a>
  </div>
</div>

<script>
let adminPwd = '';

async function api(path, body) {
  const res = await fetch(`/api/auth${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ adminPassword: adminPwd, ...body })
  });
  return res.json();
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg show ${type}`;
  setTimeout(() => el.classList.remove('show'), 4000);
}

async function authAdmin() {
  const pass = document.getElementById('admin-pass').value.trim();
  if (!pass) return;
  adminPwd = pass;
  const data = await api('/admin/users', {}).catch(() => null);
  if (!data || data.error) {
    showMsg('auth-msg', data?.error === 'Unauthorized' ? 'Incorrect admin password.' : 'Could not connect. Is the site deployed?', 'error');
    adminPwd = '';
    return;
  }
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('main-section').style.display = 'block';
  renderUsers(data.users);
}

function logout() {
  adminPwd = '';
  document.getElementById('auth-section').style.display = 'block';
  document.getElementById('main-section').style.display = 'none';
  document.getElementById('admin-pass').value = '';
}

async function addUser() {
  const username = document.getElementById('new-user').value.trim();
  const password = document.getElementById('new-pass').value.trim();
  if (!username || !password) { showMsg('main-msg', 'Both username and password are required.', 'error'); return; }
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Adding…';
  const data = await api('/admin/users/add', { username, password }).catch(() => ({ error: 'Network error' }));
  btn.disabled = false; btn.textContent = 'Add user';
  if (data.error) { showMsg('main-msg', data.error, 'error'); return; }
  showMsg('main-msg', `User "${data.username}" added successfully.`, 'success');
  document.getElementById('new-user').value = '';
  document.getElementById('new-pass').value = '';
  await refreshUsers();
}

async function deleteUser(username) {
  if (!confirm(`Delete user "${username}"? They will be logged out immediately.`)) return;
  const data = await api('/admin/users/delete', { username }).catch(() => ({ error: 'Network error' }));
  if (data.error) { showMsg('main-msg', data.error, 'error'); return; }
  showMsg('main-msg', `User "${username}" deleted.`, 'success');
  await refreshUsers();
}

async function resetPassword(username) {
  const row = document.getElementById(`reset-${username}`);
  const inp = row.querySelector('input');
  const newPassword = inp.value.trim();
  if (!newPassword) { showMsg('main-msg', 'Enter a new password first.', 'error'); return; }
  const data = await api('/admin/users/reset-password', { username, newPassword }).catch(() => ({ error: 'Network error' }));
  if (data.error) { showMsg('main-msg', data.error, 'error'); return; }
  showMsg('main-msg', `Password reset for "${username}".`, 'success');
  inp.value = '';
  row.style.display = 'none';
}

function renderUsers(users) {
  const list = document.getElementById('user-list');
  const count = document.getElementById('user-count');
  count.textContent = `(${users.length})`;
  if (!users.length) { list.innerHTML = '<div class="empty">No users yet. Add one above.</div>'; return; }
  list.innerHTML = users.map(u => `
    <div class="user-row">
      <div>
        <div class="user-name">${u.username}</div>
        <div class="user-date">Added ${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—'}</div>
        <div class="reset-row" id="reset-${u.username}" style="display:none">
          <input type="password" placeholder="New password (min 6 chars)" onkeydown="if(event.key==='Enter')resetPassword('${u.username}')">
          <button class="btn btn-primary" style="padding:5px 10px;font-size:11px" onclick="resetPassword('${u.username}')">Set</button>
          <button class="btn btn-secondary" style="padding:5px 10px;font-size:11px" onclick="document.getElementById('reset-${u.username}').style.display='none'">Cancel</button>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-left:auto">
        <button class="btn btn-secondary" style="padding:5px 10px;font-size:11px" onclick="document.getElementById('reset-${u.username}').style.display=document.getElementById('reset-${u.username}').style.display==='none'?'flex':'none'">Reset pwd</button>
        <button class="btn btn-danger" style="padding:5px 10px;font-size:11px" onclick="deleteUser('${u.username}')">Delete</button>
      </div>
    </div>`).join('');
}

async function refreshUsers() {
  const data = await api('/admin/users', {}).catch(() => null);
  if (data && !data.error) renderUsers(data.users);
}

document.getElementById('admin-pass').focus();
</script>
</body>
</html>
