[build]
  publish = "."
  functions = "netlify/functions"
  command = """sed -i \
    "s|%%SUPABASE_URL%%|${SUPABASE_URL}|g; \
     s|%%SUPABASE_ANON_KEY%%|${SUPABASE_ANON_KEY}|g" \
    app.js"""

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude-proxy"
  status = 200
